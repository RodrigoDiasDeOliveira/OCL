server:
  port: 8080

spring:
  application:
    name: tlp-rfid
  datasource:
    url: jdbc:h2:mem:tlp;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

jwt:
  secret: ${JWT_SECRET:MinhaChaveSuperSecreta12345678901234567890}  # mínimo 32 chars
  expiration: 86400000   # 24 horas

logging:
  level:
    com.triminds.tlp: DEBUG
    org.springframework.security: INFO