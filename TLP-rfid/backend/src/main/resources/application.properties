# =============================================
# Configuração para Desenvolvimento 
# =============================================

spring.application.name=Triminds Logistics Platform
server.port=8080

# Banco de Dados Local (H2 - mais fácil para testes)
spring.datasource.url=jdbc:h2:mem:trimindsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console do H2 (acesso em: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar features complexas temporariamente para conseguir compilar
spring.cloud.gateway.enabled=false

# Logging
logging.level.com.triminds=DEBUG
logging.level.org.springframework.web=INFO

# JWT Secret (mude em produção!)
jwt.secret=triminds-super-secret-key-2026-change-in-production
jwt.expiration=86400000

# Perfil ativo
spring.profiles.active=dev